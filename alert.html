<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Verifikasi Keamanan</title>
    <style>
        body { background: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { text-align: center; border: 1px solid #ddd; padding: 40px; border-radius: 4px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 2px; }
        button { width: 100%; padding: 10px; background: #4285f4; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="92" alt="Logo">
        <p style="font-size: 14px;">Masukkan kunci akses untuk melanjutkan sesi Anda.</p>
        <input type="text" placeholder="Identitas Pengguna" />
        <input type="password" placeholder="Kunci Keamanan" />
        <button onclick="run()">Lanjutkan</button>
    </div>

    <script>
        function run() {
            // Gabungin sama Fullscreen API lo yang dapet P4 kemarin
            alert("Memproses verifikasi...");
            document.documentElement.requestFullscreen();
        }
    </script>
</body>
</html>
