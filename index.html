<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Chrome UI Research - FARISSAL B</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; padding: 30px; text-align: center; }
        .box { border: 2px solid #ff00ff; padding: 20px; border-radius: 15px; background: #1e1e1e; display: inline-block; }
        button { background: #ff00ff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; margin: 10px; font-weight: bold; }
        button:hover { background: #d400d4; }
        #log { margin-top: 30px; text-align: left; background: #000; color: #0f0; padding: 15px; border-radius: 5px; font-family: monospace; height: 200px; overflow-y: auto; border: 1px solid #333; }
        .alert { color: #ff3333; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Chrome UI/Logic Researcher v3.0</h2>
    <p>Target: <b>Split View / Side Panel Focus Bypass</b></p>
    
    <button onclick="triggerSpoof('file')">Test File Picker</button>
    <button onclick="triggerSpoof('print')">Test Print Dialog</button>
    <button onclick="delayedTrigger()">Delayed Attack (5s)</button>
    
    <div id="log">>> Scanner Ready. Push to GitHub and test in Split View.</div>
</div>

<script>
    const logBox = document.getElementById('log');

    function log(msg, isAlert = false) {
        const div = document.createElement('div');
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${isAlert ? '<span class="alert">!!!</span> ' : ''}${msg}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    // Fungsi untuk memicu dialog sistem
    function triggerSpoof(type) {
        log(`Triggering ${type} dialog...`);
        
        if (type === 'file') {
            const input = document.createElement('input');
            input.type = 'file';
            input.click(); // Mencoba membuka file picker
        } else if (type === 'print') {
            window.print(); // Mencoba membuka print dialog
        }
    }

    // Teknik "Delayed Attack": 
    // Menjalankan perintah SETELAH user pindah ke tab lain (Split View test)
    function delayedTrigger() {
        log("Delayed attack started. PINDAH KE TAB LAIN SEKARANG!");
        
        setTimeout(() => {
            log("Executing background trigger...", true);
            
            // Mencoba mencuri fokus dengan memicu dialog saat tab ini tidak aktif
            const input = document.createElement('input');
            input.type = 'file';
            input.click();
            
            // Cek apakah dialog berhasil muncul di atas tab yang sedang aktif
            if (document.hidden) {
                log("DANGER: Dialog triggered while tab was HIDDEN!", true);
            } else {
                log("Tab was active, isolation working.");
            }
        }, 5000); // 5 detik untuk lo pindah fokus ke tab sebelah (Google/Drive)
    }

    // Deteksi perubahan visibilitas tab
    document.addEventListener("visibilitychange", () => {
        log(`Tab Status: ${document.hidden ? 'HIDDEN' : 'VISIBLE'}`);
    });

</script>
</body>
</html>
