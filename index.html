<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chrome Security Lab - FARISSAL B</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* Bar Alamat Palsu - Muncul pas Fullscreen */
        #fake-ui {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: #fff; z-index: 9999; align-items: center; padding: 0 16px;
            box-sizing: border-box; border-bottom: 1px solid #dadce0;
        }
        .address-bar {
            background: #f1f3f4; border-radius: 24px; padding: 8px 16px;
            width: 100%; display: flex; align-items: center; gap: 10px;
        }

        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; text-align: center; width: 80%; border: 1px solid #333; }
        button { background: #8ab4f8; color: #000; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="fake-ui">
    <div class="address-bar">
        <span style="font-size: 16px;">🔒</span>
        <span style="color: #202124; font-size: 14px;">accounts.google.com/signin</span>
    </div>
</div>

<div class="card" id="main-content">
    <h2 style="color: #8ab4f8;">Security Research</h2>
    <p style="color: #9aa0a6;">Target: Chrome Android UI Spoofing</p>
    <button id="launchBtn">CEK KERANAN SISTEM</button>
</div>

<script>
    const btn = document.getElementById('launchBtn');
    const fakeUi = document.getElementById('fake-ui');

    btn.addEventListener('click', () => {
        // Masuk ke Fullscreen Mode
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().then(() => {
                // Tampilkan UI palsu begitu masuk fullscreen
                fakeUi.style.display = 'flex';
                document.getElementById('main-content').innerHTML = `
                    <h2 style="color: #4caf50;">SESSION SECURE</h2>
                    <p>Silakan login di address bar atas.</p>
                `;
            });
        } else {
            alert("Browser lo gak support Fullscreen API.");
        }
    });

    // Deteksi kalau user keluar dari fullscreen (pencet back)
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            fakeUi.style.display = 'none';
        }
    });
</script>

</body>
</html>
