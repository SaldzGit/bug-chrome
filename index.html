<!DOCTYPE html>
<html>
<head>
    <title>Chrome Security Research - FARISSAL B</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #target-input { width: 300px; padding: 10px; font-size: 16px; }
        #log { background: #000; color: #0f0; padding: 15px; margin-top: 20px; border-radius: 5px; height: 200px; overflow-y: auto; }
        .success { color: #f00; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Chrome Autofill / Shadow-DOM Observer</h2>
    <p>Step: Klik input di bawah, arahkan kursor (hover) ke saran alamat/email yang muncul.</p>
    
    <input id="target-input" type="text" placeholder="Masukkan Alamat..." autocomplete="street-address">

    <div id="log">--- System Logs ---</div>

    <script>
        const logBox = document.getElementById('log');
        const inp = document.getElementById('target-input');

        function logger(msg, isSuccess = false) {
            const span = document.createElement('div');
            if(isSuccess) span.className = 'success';
            span.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(span);
        }

        // Teknik 1: Mencoba mengakses Pseudo-Element via KeyframeEffect (Seperti Bug Brendan)
        try {
            let effect = new KeyframeEffect(inp, [
                { opacity: 0 }, { opacity: 1 }
            ], { duration: 1000, pseudoElement: "::placeholder" });
            
            // Mencoba cloning untuk memecah isolasi target
            let clonedEffect = new KeyframeEffect(effect);
            
            if (clonedEffect.target !== inp) {
                logger("POTENTIAL LEAK: Cloned target is different from input!", true);
                logger("Target: " + clonedEffect.target);
            } else {
                logger("KeyframeEffect isolated correctly.");
            }
        } catch (e) {
            logger("Error in KeyframeEffect: " + e.message);
        }

        // Teknik 2: Monitoring perubahan pada Shadow Root via Animation Events
        inp.addEventListener('animationstart', (e) => {
            logger("Animation detected on: " + e.target.tagName);
            if (e.target !== inp) {
                logger("ALERT: Unexpected element animated! Possible Shadow-DOM leak.", true);
            }
        });

        // Teknik 3: Memantau "Dirty Check" saat Autofill aktif
        setInterval(() => {
            if (inp.matches(':-webkit-autofill')) {
                logger("Autofill detected! Scanning for leaked data...");
                // Di sini lo bisa eksperimen ngebaca style yang berubah mendadak
            }
        }, 500);

    </script>
</body>
</html>
