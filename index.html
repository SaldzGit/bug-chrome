<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud File Explorer - FARISSAL B</title>
    <style>
        body { background: #010409; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 40px; text-align: center; }
        .container { border: 1px solid #30363d; border-radius: 12px; background: #0d1117; padding: 30px; max-width: 600px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; }
        .upload-area { border: 2px dashed #238636; padding: 40px; border-radius: 8px; margin: 20px 0; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { background: #161b22; border-color: #3fb950; }
        #status { font-family: monospace; text-align: left; background: #000; padding: 15px; border-radius: 6px; color: #3fb950; height: 200px; overflow-y: auto; font-size: 13px; border: 1px solid #333; }
        .btn { background: #238636; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📁 Cloud Web Explorer</h2>
        <p style="color: #8b949e;">Select a directory to sync files to our secure cloud.</p>
        
        <div class="upload-area" id="dropZone">
            <p>Click the button below to<br><b>Select Local Folder</b></p>
            <button class="btn" id="startBtn">SYNC FOLDER</button>
        </div>

        <div id="status">
            [+] System Idle...<br>
            [+] Secure Context: <script>document.write(window.isSecureContext ? "YES" : "NO")</script>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        function log(msg) {
            status.innerHTML += `<br>> ${msg}`;
            status.scrollTop = status.scrollHeight;
        }

        startBtn.addEventListener('click', async () => {
            try {
                // Memicu Directory Picker
                log("Requesting Directory Access...");
                const dirHandle = await window.showDirectoryPicker();
                
                log("ACCESS GRANTED! Scanning contents...");
                log("-----------------------------------");

                // Membaca isi folder secara rekursif (Data Discovery)
                for await (const entry of dirHandle.values()) {
                    const type = entry.kind === 'directory' ? '[DIR]' : '[FILE]';
                    log(`${type} ${entry.name}`);
                    
                    // Kalau ketemu file sensitif, lo bisa tambahin logika buat "baca" isinya di sini
                    if (entry.name.includes('.txt') || entry.name.includes('.json')) {
                        log(`<span style="color:#f85149">! Critical File Found: ${entry.name}</span>`);
                    }
                }

                log("-----------------------------------");
                log("Scan Completed. Data ready for exfiltration.");
                alert('Success! All file metadata captured.');

            } catch (err) {
                log(`<span style="color:#f85149">ERROR: ${err.message}</span>`);
                console.error(err);
            }
        });
    </script>
</body>
</html>
