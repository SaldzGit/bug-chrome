<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Login PoC</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
.box{
    width:320px;
    margin:80px auto;
    background:#fff;
    padding:24px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:10px;
}
.notice{
    font-size:13px;
    color:#666;
}
</style>
</head>
<body>

<div class="box">
<h2>Security Research By FARISSAL B</h2>

<p class="notice">
This page is a harmless proof-of-concept used to demonstrate a browser
address bar UI issue. Any values entered below are discarded.
</p>

<input type="text" placeholder="Demo username">
<input type="password" placeholder="Demo password">

<button type="button" onclick="alert('No data is collected.');">
Demo Login
</button>

</div>

</body>
</html>
